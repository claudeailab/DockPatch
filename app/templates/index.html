<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dockwatch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #21253300;
      --border:   #2a2d3a;
      --accent:   #3b82f6;
      --green:    #22c55e;
      --yellow:   #f59e0b;
      --red:      #ef4444;
      --muted:    #6b7280;
      --text:     #e2e8f0;
      --radius:   8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .logo span { font-size: 20px; }
    .header-right { display: flex; align-items: center; gap: 8px; }

    /* ── checking banner ── */
    #checking-banner {
      display: none;
      background: linear-gradient(90deg, #1e3a5f, #1a2d4a);
      border-bottom: 1px solid #2d5a8e;
      padding: 8px 20px;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #93c5fd;
    }
    #checking-banner.visible { display: flex; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #3b82f640;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .banner-bar {
      flex: 1;
      height: 3px;
      background: #1e3a5f;
      border-radius: 2px;
      overflow: hidden;
    }
    .banner-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 2px;
      animation: indeterminate 1.5s ease-in-out infinite;
      width: 40%;
    }
    @keyframes indeterminate {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* ── main layout ── */
    main {
      padding: 16px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── summary row ── */
    .summary {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 130px;
    }
    .stat-icon { font-size: 20px; }
    .stat-val { font-size: 20px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .toolbar-left { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
    input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 6px 10px;
      font-size: 13px;
      width: 200px;
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    /* ── buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity .15s, filter .15s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { filter: brightness(1.15); }
    .btn:disabled { opacity: .45; cursor: default; }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-ghost    { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--text); filter: none; }
    .btn-success  { background: #16803c; color: #fff; }
    .btn-danger   { background: #991b1b; color: #fff; }
    .btn-sm       { padding: 4px 9px; font-size: 12px; }
    .btn-settings { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
    .btn-settings:hover { color: var(--text); filter: none; }
    .btn-settings.active { border-color: var(--accent); color: var(--accent); }

    /* ── table ── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #12151f; }
    th {
      text-align: left;
      padding: 9px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th:hover { color: var(--text); }
    td {
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:hover td { background: #ffffff08; }
    .name-cell { font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .self-badge {
      font-size: 10px;
      background: #312e81;
      color: #a5b4fc;
      padding: 1px 5px;
      border-radius: 4px;
      font-weight: 600;
    }
    .image-cell { color: var(--muted); font-size: 12px; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .actions { display: flex; gap: 5px; justify-content: flex-end; flex-wrap: wrap; }
    .self-lock { font-size: 13px; color: var(--muted); padding: 4px 6px; }

    /* ── badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-running   { background: #14532d40; color: var(--green); border: 1px solid #166534; }
    .badge-exited    { background: #7f1d1d40; color: var(--red);   border: 1px solid #991b1b; }
    .badge-paused    { background: #78350f40; color: var(--yellow); border: 1px solid #92400e; }
    .badge-other     { background: #1e293b;   color: var(--muted);  border: 1px solid var(--border); }
    .badge-uptodate  { background: #14532d40; color: var(--green); border: 1px solid #166534; }
    .badge-available { background: #78350f40; color: var(--yellow); border: 1px solid #92400e; }
    .badge-unknown   { background: #1e293b;   color: var(--muted);  border: 1px solid var(--border); }
    .badge-error     { background: #7f1d1d40; color: var(--red);   border: 1px solid #991b1b; }
    .badge-checking  { background: #1e3a5f40; color: #93c5fd; border: 1px solid #2d5a8e; }

    /* ── settings panel ── */
    #settings-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 12px;
      gap: 14px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    #settings-panel.open { display: flex; }
    .setting-group { display: flex; flex-direction: column; gap: 4px; }
    .setting-group label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .setting-group input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 6px 10px;
      font-size: 13px;
      width: 130px;
      outline: none;
    }
    .setting-group input[type="number"]:focus { border-color: var(--accent); }
    .setting-hint { font-size: 11px; color: var(--muted); }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-row label { font-size: 13px; color: var(--text); text-transform: none; letter-spacing: 0; }
    /* toggle switch */
    .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: background .2s;
    }
    .slider:before {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider:before { transform: translateX(16px); }
    .settings-actions { display: flex; gap: 8px; align-items: flex-end; padding-bottom: 0; }

    /* ── toast ── */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 13px;
      animation: slideIn .2s ease;
      max-width: 320px;
    }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error   { border-left: 3px solid var(--red); }
    .toast.info    { border-left: 3px solid var(--accent); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ── version ── */
    .version { font-size: 11px; color: var(--muted); }

    /* ── empty ── */
    .empty { text-align: center; padding: 40px; color: var(--muted); }

    /* ── mobile ── */
    @media (max-width: 640px) {
      main { padding: 12px; }
      .stat { min-width: 100px; padding: 8px 12px; }
      .stat-val { font-size: 18px; }
      .image-cell { display: none; }
      th.hide-mobile, td.hide-mobile { display: none; }
      input[type="text"] { width: 140px; }
      .setting-group input[type="number"] { width: 110px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><span>🐳</span> Dockwatch</div>
  <div class="header-right">
    <button class="btn btn-settings btn-sm" id="settings-btn" onclick="toggleSettings()">⚙ Settings</button>
    <span class="version">v{{ version }}</span>
  </div>
</header>

<div id="checking-banner">
  <div class="spinner"></div>
  <span>Scanning containers for updates…</span>
  <div class="banner-bar"><div class="banner-bar-fill"></div></div>
</div>

<main>

  <!-- summary -->
  <div class="summary">
    <div class="stat">
      <span class="stat-icon">📦</span>
      <div><div class="stat-val" id="s-total">—</div><div class="stat-label">Total</div></div>
    </div>
    <div class="stat">
      <span class="stat-icon">🟢</span>
      <div><div class="stat-val" id="s-running">—</div><div class="stat-label">Running</div></div>
    </div>
    <div class="stat">
      <span class="stat-icon">⬆️</span>
      <div><div class="stat-val" id="s-updates">—</div><div class="stat-label">Updates</div></div>
    </div>
    <div class="stat">
      <span class="stat-icon">✅</span>
      <div><div class="stat-val" id="s-uptodate">—</div><div class="stat-label">Up to date</div></div>
    </div>
  </div>

  <!-- settings panel -->
  <div id="settings-panel">
    <div class="setting-group">
      <label>Check Interval</label>
      <input type="number" id="cfg-check" min="0" placeholder="0 = off">
      <span class="setting-hint">minutes (0 = off)</span>
    </div>
    <div class="setting-group">
      <label>Auto-update Interval</label>
      <input type="number" id="cfg-update" min="0" placeholder="0 = off">
      <span class="setting-hint">minutes (0 = off)</span>
    </div>
    <div class="setting-group">
      <label>Startup</label>
      <div class="toggle-row">
        <label class="switch">
          <input type="checkbox" id="cfg-startup">
          <span class="slider"></span>
        </label>
        <label for="cfg-startup">Check for updates on start</label>
      </div>
    </div>
    <div class="settings-actions">
      <button class="btn btn-primary btn-sm" onclick="saveSettings()">Save</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleSettings()">Close</button>
    </div>
  </div>

  <!-- toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <input type="text" id="search" placeholder="🔍 Filter containers…" oninput="renderTable()">
      <button class="btn btn-primary btn-sm" id="check-all-btn" onclick="checkAll()">🔍 Check all</button>
    </div>
  </div>

  <!-- table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('name')">Name</th>
          <th onclick="sortBy('image')" class="hide-mobile">Image</th>
          <th onclick="sortBy('status')">State</th>
          <th onclick="sortBy('update_status')">Update</th>
          <th style="text-align:right">Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</main>

<div id="toast-container"></div>

<script>
let containers = [];
let sortKey = 'name';
let sortDir = 1;
let settingsOpen = false;
let wasChecking = false;

function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settings-panel').classList.toggle('open', settingsOpen);
  document.getElementById('settings-btn').classList.toggle('active', settingsOpen);
  if (settingsOpen) loadSettings();
}

async function loadSettings() {
  const r = await fetch('/api/settings');
  const d = await r.json();
  document.getElementById('cfg-check').value   = d.check_interval_minutes || '';
  document.getElementById('cfg-update').value  = d.update_interval_minutes || '';
  document.getElementById('cfg-startup').checked = !!d.check_on_startup;
}

async function saveSettings() {
  const payload = {
    check_interval_minutes:  parseInt(document.getElementById('cfg-check').value)  || 0,
    update_interval_minutes: parseInt(document.getElementById('cfg-update').value) || 0,
    check_on_startup:        document.getElementById('cfg-startup').checked,
  };
  const r = await fetch('/api/settings', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  const d = await r.json();
  if (d.ok) toast('Settings saved', 'success');
  else toast('Failed to save settings', 'error');
}

async function poll() {
  try {
    const r = await fetch('/api/containers');
    const d = await r.json();
    containers = d.containers;
    const isChecking = d.checking_all;

    const banner = document.getElementById('checking-banner');
    if (isChecking) {
      banner.classList.add('visible');
    } else {
      if (wasChecking && !isChecking) {
        toast('Update check complete', 'success');
      }
      banner.classList.remove('visible');
    }
    wasChecking = isChecking;

    document.getElementById('check-all-btn').disabled = isChecking;
    updateStats();
    renderTable();
  } catch(e) { console.error(e); }
}

function updateStats() {
  document.getElementById('s-total').textContent   = containers.length;
  document.getElementById('s-running').textContent = containers.filter(c => c.status === 'running').length;
  document.getElementById('s-updates').textContent = containers.filter(c => c.update_status === 'update_available').length;
  document.getElementById('s-uptodate').textContent= containers.filter(c => c.update_status === 'up_to_date').length;
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  renderTable();
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  let rows = containers.filter(c => c.name.toLowerCase().includes(q) || c.image.toLowerCase().includes(q));
  rows.sort((a, b) => {
    const av = a[sortKey] || '';
    const bv = b[sortKey] || '';
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No containers found</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(c => {
    const stateBadge = {
      running: '<span class="badge badge-running">● Running</span>',
      exited:  '<span class="badge badge-exited">● Exited</span>',
      paused:  '<span class="badge badge-paused">● Paused</span>',
    }[c.status] || `<span class="badge badge-other">● ${c.status}</span>`;

    let updBadge;
    if (c.checking) {
      updBadge = '<span class="badge badge-checking">⟳ Checking…</span>';
    } else {
      updBadge = {
        up_to_date:       '<span class="badge badge-uptodate">✓ Up to date</span>',
        update_available: '<span class="badge badge-available">⬆ Update available</span>',
        error:            '<span class="badge badge-error">✕ Error</span>',
      }[c.update_status] || '<span class="badge badge-unknown">— Unknown</span>';
    }

    const selfTag = c.is_self ? '<span class="self-badge">self</span>' : '';
    const actions = c.is_self
      ? '<span class="self-lock" title="Cannot update self while running">🔒</span>'
      : `<button class="btn btn-ghost btn-sm" onclick="checkOne('${c.name}')">🔍</button>
         <button class="btn btn-success btn-sm" onclick="updateOne('${c.name}')" ${c.update_status !== 'update_available' ? 'disabled' : ''}>⬆ Update</button>`;

    return `<tr>
      <td><div class="name-cell">${c.name}${selfTag}</div></td>
      <td class="image-cell hide-mobile" title="${c.image}">${c.image}</td>
      <td>${stateBadge}</td>
      <td>${updBadge}</td>
      <td><div class="actions">${actions}</div></td>
    </tr>`;
  }).join('');
}

async function checkAll() {
  await fetch('/api/check/all', { method: 'POST' });
  toast('Checking all containers…', 'info');
}

async function checkOne(name) {
  await fetch('/api/check/' + encodeURIComponent(name), { method: 'POST' });
  toast('Checking ' + name + '…', 'info');
}

async function updateOne(name) {
  if (!confirm('Update ' + name + '? The container will be restarted.')) return;
  toast('Updating ' + name + '…', 'info');
  const r = await fetch('/api/update/' + encodeURIComponent(name), { method: 'POST' });
  const d = await r.json();
  if (d.ok) toast(name + ' updated successfully ✓', 'success');
  else toast('Update failed: ' + d.error, 'error');
  poll();
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// start
poll();
setInterval(poll, 4000);
</script>
</body>
</html>
