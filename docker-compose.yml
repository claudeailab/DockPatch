services:
  dockpatch:
    image: ghcr.io/claudeailab/dockpatch
    container_name: dockpatch
    hostname: dockpatch
    restart: unless-stopped
    user: "0"
    environment:
      TZ: ${TZ}
    ports:
      - 8093:8093
    volumes:
      - ./config/dockpatch:/data
      - /var/run/docker.sock:/var/run/docker.sock  # required — gives access to Docker daemon
